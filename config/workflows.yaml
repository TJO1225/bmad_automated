workflows:
  create-story:
    prompt_template: "/bmad-create-story - Create story: {{.StoryKey}}. Do not ask questions."
  dev-story:
    prompt_template: "/bmad-dev-story - Implement story: {{.StoryKey}}. Complete every task in the story checklist, run tests as you go, and do not pause for confirmation. Use your best judgement based on existing patterns. Only stop when every task is checked and status is advanced to 'review'."
  code-review:
    prompt_template: "/bmad-code-review - Review story: {{.StoryKey}}. Review uncommitted changes in the working tree. Auto-apply any patches you propose rather than asking for confirmation."

modes:
  bmad:
    steps: [create-story, dev-story, code-review, commit-branch, open-pr]
  beads:
    steps: [create-story, sync-to-beads]

claude:
  output_format: stream-json
  binary_path: claude

output:
  truncate_lines: 20
  truncate_length: 60
